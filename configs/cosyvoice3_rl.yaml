project:
  name: "VideoDubbingLab"

paths:
  cache_dir: "./data/cache"
  output_dir: "./data/output"

download:
  format: "bv*+ba/b"
  merge_output_format: "mp4"
  write_subs: true
  write_auto_subs: true
  subtitle_languages:
    - "en"
  convert_subs_to: "srt"
  write_info_json: true
  write_thumbnail: true
  keep_video_stream: true
  keep_audio_stream: true
  avoid_duplicate_stream_downloads: true

subtitle:
  source_language: "en"
  target_language: "zh"
  prefer_manual_subtitle: true
  enable_reflow: true
  max_segment_chars: 180
  max_segment_duration: 10.0
  max_merge_gap: 1.0
  min_segment_duration: 0.3
  max_zh_chars_per_second: 4.2
  min_zh_chars: 4

llm:
  provider: "openai_compatible"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  model: "deepseek-v4-flash"
  temperature: 0.2
  timeout_seconds: 120
  max_retries: 3
  batch_size: 20

translation:
  mode: "technical_oral_zh"
  enable_summary: true
  enable_terms: true
  enable_reflect_adapt: true
  summary_max_chars: 8000
  cache_enabled: true
  prompt_version: "duration-aware-v1"
  over_duration_ratio: 1.10
  preserve_terms:
    - "CUDA"
    - "GPU"
    - "CPU"
    - "warp"
    - "thread"
    - "thread block"
    - "SM"
    - "shared memory"
    - "register"
    - "kernel"
    - "tensor core"
    - "Triton"
    - "PyTorch"
    - "NVIDIA"
    - "Blackwell"
    - "Hopper"
    - "Ampere"

asr:
  enabled: false
  backend: "faster_whisper"
  model_size: "small"
  device: "auto"
  compute_type: "auto"
  language: "en"
  word_timestamps: false
  output_srt: true

tts:
  backend: "cosyvoice_http"
  endpoint: "http://127.0.0.1:9880/tts"
  voice: "Fun-CosyVoice3-0.5B-2512_RL"
  rate: "+0%"
  volume: "+0%"
  pitch: "+0Hz"
  sample_rate: 24000
  speaker: "default"
  ref_audio: null
  prompt_text: "You are a helpful assistant.<|endofprompt|>希望你以后能够做得比我还好。"
  timeout_seconds: 180
  model_version: "Fun-CosyVoice3-0.5B-2512_RL"

tts_batch:
  enabled: true
  endpoint: "http://127.0.0.1:9880/tts_batch"
  max_batch_size: 8
  concurrency: 1
  cache_enabled: true

audio_align:
  sample_rate: 24000
  max_speedup: 1.4
  min_speed: 0.85
  silence_padding_ms: 80
  allow_overflow: true
  overflow_warning_ratio: 1.35
  enable_dubbing_plan: true
  speech_chars_per_second: 4.2
  planning_tolerance: 1.5
  max_merge_segments: 3
  max_shift_ms: 250

audio_postprocess:
  trim_silence: true
  normalize_loudness: true
  target_lufs: -16.0
  true_peak_db: -1.0
  fade_in_ms: 10
  fade_out_ms: 10
  max_time_stretch_ratio: 1.12

audio_separation:
  enabled: false
  backend: "demucs"
  two_stems: "vocals"
  vocals_volume: 0.0
  background_volume: 1.0

mux:
  output_container: "mp4"
  replace_audio: true
  keep_original_video_codec: true
  burn_subtitle: true
  attach_subtitle: false
  keep_original_audio: false
  mix_original_audio: true
  original_audio_volume: 0.18
  dubbed_audio_volume: 1.0
  duck_original_audio: true
  duck_volume: 0.12
  duck_fade_ms: 80
  create_preview: false
  preview_seconds: 60

qc:
  max_shift_seconds: 0.25
  max_duration_diff_seconds: 1.0
  max_overflow_ratio: 0.05
  target_lufs: -16.0
  true_peak_db: -1.0

batch:
  jobs: 1
  download_concurrency: 2
  translate_concurrency: 2
  tts_concurrency: 1
  mux_concurrency: 1

runtime:
  resume: true
  verbose: true
  log_level: "INFO"
