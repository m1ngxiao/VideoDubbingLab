project:
  name: "VideoDubbingLab"

paths:
  cache_dir: "./data/cache"
  output_dir: "./data/output"

download:
  format: "bv*+ba/b"
  merge_output_format: "mp4"
  write_subs: true
  write_auto_subs: true
  subtitle_languages:
    - "en"
  convert_subs_to: "srt"
  write_info_json: true
  write_thumbnail: true
  keep_video_stream: true
  keep_audio_stream: true

subtitle:
  source_language: "en"
  target_language: "zh"
  prefer_manual_subtitle: true
  enable_reflow: true
  max_segment_chars: 180
  max_segment_duration: 10.0
  max_merge_gap: 1.0
  min_segment_duration: 0.3

llm:
  provider: "openai_compatible"
  base_url: "https://api.deepseek.com"
  api_key_env: "DEEPSEEK_API_KEY"
  model: "deepseek-v4-flash"
  temperature: 0.2
  timeout_seconds: 120
  max_retries: 3
  batch_size: 20

translation:
  mode: "technical_oral_zh"
  enable_summary: true
  enable_terms: true
  enable_reflect_adapt: true
  summary_max_chars: 8000
  preserve_terms:
    - "CUDA"
    - "GPU"
    - "CPU"
    - "warp"
    - "thread"
    - "thread block"
    - "SM"
    - "shared memory"
    - "register"
    - "kernel"
    - "tensor core"
    - "Triton"
    - "PyTorch"
    - "NVIDIA"
    - "Blackwell"
    - "Hopper"
    - "Ampere"

tts:
  backend: "cosyvoice_http"
  endpoint: "http://127.0.0.1:9880/tts"
  voice: "Fun-CosyVoice3-0.5B-2512_RL"
  rate: "+0%"
  volume: "+0%"
  pitch: "+0Hz"
  sample_rate: 24000
  speaker: "default"
  ref_audio: null
  prompt_text: "You are a helpful assistant.<|endofprompt|>希望你以后能够做得比我还好。"
  timeout_seconds: 180

audio_align:
  sample_rate: 24000
  max_speedup: 1.4
  min_speed: 0.85
  silence_padding_ms: 80
  allow_overflow: true
  overflow_warning_ratio: 1.35
  enable_dubbing_plan: true
  speech_chars_per_second: 4.2
  planning_tolerance: 1.5
  max_merge_segments: 3

mux:
  output_container: "mp4"
  replace_audio: true
  keep_original_video_codec: true
  burn_subtitle: true
  attach_subtitle: false
  keep_original_audio: false
  mix_original_audio: true
  original_audio_volume: 0.18
  dubbed_audio_volume: 1.0

runtime:
  resume: true
  verbose: true
  log_level: "INFO"
